<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Einkaufshilfe</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <h1><svg class="cart-icon" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12.94-1.7h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 20.04 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25z"/></svg> Einkaufshilfe</h1>
        <div id="total-display">
            <span id="total">0,00 €</span>
            <span id="item-count">(0 Artikel)</span>
        </div>
    </header>

    <!-- Custom amount overlay -->
    <div id="custom-overlay" class="overlay hidden">
        <form id="custom-form" class="overlay-box" autocomplete="off">
            <label for="custom-input">Betrag in Euro:</label>
            <input id="custom-input" type="text" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" placeholder="z.B. 4,59" autocomplete="off">
            <div class="overlay-actions">
                <button type="button" id="custom-cancel" class="action-btn reset-btn">Abbrechen</button>
                <button type="submit" id="custom-ok" class="action-btn custom-btn">Hinzufügen</button>
            </div>
        </form>
    </div>

    <div id="layout">
        <main id="main">
            <section id="price-buttons" aria-label="Preise"></section>

            <section id="action-buttons">
                <button id="btn-undo" class="action-btn undo-btn" aria-label="Letzten Eintrag löschen">↩ Zurück</button>
                <button id="btn-custom" class="action-btn custom-btn" aria-label="Eigenen Betrag eingeben">✎ Betrag</button>
                <button id="btn-reset" class="action-btn reset-btn" aria-label="Alles zurücksetzen">✕ Reset</button>
            </section>
        </main>

        <aside id="item-list">
            <h2>Einträge</h2>
            <ol id="entries" reversed></ol>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
